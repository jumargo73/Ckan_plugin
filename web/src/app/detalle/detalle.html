<div class="dataset-detail-container" *ngIf="dataset">
  <div class="header-detalle">
    <button class="btn-volver" (click)="irAtras()">← Volver a la búsqueda</button>
    <h1>{{ dataset.title }}</h1>
    <div class="badge-organizacion">{{ dataset.organization?.title }}</div>
  </div>

  <div class="card-info">
    <h3>Descripción</h3>
    <p class="notes-detalle">{{ dataset.notes || 'Sin descripción disponible.' }}</p>
  </div>
  
  <div class="recursos-seccion">
    <h3>Recursos Disponibles ({{ dataset.resources?.length }})</h3>
    <div class="recursos-grid">
      <div *ngFor="let res of dataset.resources" class="recurso-card">
        <div class="res-icon">{{ res.format }}</div>
        <div class="res-info">
          <strong>{{ res.name || 'Recurso sin nombre' }}</strong>
          <a [href]="res.url" target="_blank" class="btn-download">Descargar</a>
        </div>
      </div>
    </div>
  </div>
</div>
